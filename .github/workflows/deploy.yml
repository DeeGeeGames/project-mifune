name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-phaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6

      - run: npm ci
        working-directory: phaser

      - run: npm run build
        working-directory: phaser

      - uses: actions/upload-artifact@v7
        with:
          name: phaser-build
          path: phaser/dist
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: landing-page
          path: index.html
          if-no-files-found: error

  build-ecspresso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6

      - run: npm ci
        working-directory: ecspresso

      - run: npm run build
        working-directory: ecspresso

      - uses: actions/upload-artifact@v7
        with:
          name: ecspresso-build
          path: ecspresso/dist
          if-no-files-found: error

  build-godot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: true

      - name: Export web build
        run: |
          mkdir -p godot/build/web
          cd godot
          godot --headless --export-release "Web" build/web/index.html

      - uses: actions/upload-artifact@v7
        with:
          name: godot-build
          path: godot/build/web
          if-no-files-found: error

  deploy:
    needs: [build-phaser, build-ecspresso, build-godot]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: landing-page
          path: site

      - uses: actions/download-artifact@v8
        with:
          name: phaser-build
          path: site/phaser

      - uses: actions/download-artifact@v8
        with:
          name: ecspresso-build
          path: site/ecspresso

      - uses: actions/download-artifact@v8
        with:
          name: godot-build
          path: site/godot

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5
