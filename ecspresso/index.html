<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Horde Defense</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #05080f; }
		body { font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace; color: #d8e2f0; }
		#game-container { position: fixed; inset: 0; }
		#game-container canvas { display: block; }
		.hud-panel {
			position: fixed;
			background: rgba(8, 12, 22, 0.72);
			border: 1px solid rgba(150, 180, 220, 0.15);
			border-radius: 6px;
			padding: 10px 14px;
			font-size: 13px;
			line-height: 1.5;
			white-space: pre;
			pointer-events: none;
			backdrop-filter: blur(4px);
		}
		#hud-resources { top: 12px; left: 12px; font-size: 18px; font-weight: 600; color: #ffd55a; }
		#hud-mode { top: 12px; right: 12px; font-weight: 700; letter-spacing: 0.1em; }
		#hud-mode.autonomous { color: #7fb2ff; }
		#hud-mode.override { color: #ff6a6a; }
		#hud-roster { top: 60px; left: 12px; min-width: 140px; }
		#hud-menu { bottom: 12px; left: 12px; }
		#hud-help { bottom: 12px; right: 12px; color: #98a7be; }
	</style>
</head>
<body>
	<div id="game-container"></div>
	<div id="hud-resources" class="hud-panel">Resources: 0</div>
	<div id="hud-mode" class="hud-panel autonomous">AUTO</div>
	<div id="hud-roster" class="hud-panel"></div>
	<div id="hud-menu" class="hud-panel"></div>
	<div id="hud-help" class="hud-panel">Gamepad: LS heading • RT/LT thrust • RB override • Y cycle • A summon
Keyboard: mouse heading • W/S thrust • RMB override • Tab cycle • 1-4 summon • Wheel/Q/E zoom</div>
	<script type="module" src="/src/main.ts"></script>
</body>
</html>
