<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Horde Defense</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #05080f; }
		body { font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace; color: #d8e2f0; }
		#game-container { position: fixed; inset: 0; }
		#game-container canvas { display: block; }
		.hud-panel {
			position: fixed;
			background: rgba(8, 12, 22, 0.72);
			border: 1px solid rgba(150, 180, 220, 0.15);
			border-radius: 6px;
			padding: 10px 14px;
			font-size: 13px;
			line-height: 1.5;
			white-space: pre;
			pointer-events: none;
			backdrop-filter: blur(4px);
		}
		#hud-resources { top: 12px; left: 12px; font-size: 18px; font-weight: 600; color: #ffd55a; }
		#hud-roster { top: 60px; left: 12px; min-width: 140px; }
		#hud-menu { bottom: 12px; left: 12px; }
		#hud-help { bottom: 12px; right: 12px; color: #98a7be; }
		#hud-thrust { top: 48px; right: 12px; min-width: 160px; }
		#hud-wave { top: 12px; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: 600; letter-spacing: 0.08em; color: #e8f0ff; }
		#hud-summary, #hud-title {
			position: fixed;
			inset: 0;
			display: none;
			align-items: center;
			justify-content: center;
			background: rgba(5, 8, 15, 0.88);
			backdrop-filter: blur(6px);
			z-index: 10;
		}
		#hud-loadout {
			position: fixed;
			top: 60px;
			right: 12px;
			bottom: 60px;
			display: none;
			flex-direction: column;
			align-items: stretch;
			z-index: 10;
		}
		.loadout-panel {
			min-width: 320px;
			padding: 20px 24px;
			border: 1px solid rgba(150, 180, 220, 0.25);
			border-radius: 10px;
			background: rgba(8, 12, 22, 0.9);
			backdrop-filter: blur(4px);
		}
		#hud-loadout .summary-title { margin-bottom: 16px; }
		#hud-loadout-menu {
			font-size: 14px;
			line-height: 1.8;
			color: #e8f0ff;
			white-space: pre;
		}
		.summary-card {
			min-width: 360px;
			padding: 32px 48px;
			border: 1px solid rgba(150, 180, 220, 0.25);
			border-radius: 10px;
			background: rgba(8, 12, 22, 0.9);
			text-align: center;
		}
		.summary-title {
			font-size: 22px;
			font-weight: 700;
			letter-spacing: 0.12em;
			color: #ffd55a;
			margin-bottom: 20px;
		}
		.summary-stats {
			font-size: 15px;
			line-height: 1.8;
			color: #d8e2f0;
			white-space: pre;
			margin-bottom: 28px;
		}
		.summary-menu {
			font-size: 16px;
			line-height: 2;
			color: #e8f0ff;
			white-space: pre;
		}
		.thrust-label { font-size: 10px; letter-spacing: 0.1em; color: #98a7be; margin-bottom: 5px; text-align: center; }
		.thrust-track {
			position: relative;
			width: 160px;
			height: 8px;
			background: rgba(150, 180, 220, 0.12);
			border-radius: 4px;
			overflow: hidden;
		}
		.thrust-center {
			position: absolute;
			left: 50%;
			top: 0;
			width: 1px;
			height: 100%;
			background: rgba(150, 180, 220, 0.4);
		}
		.thrust-fill {
			position: absolute;
			top: 0;
			height: 100%;
			border-radius: 2px;
			transition: left 0.05s, width 0.05s;
		}
	</style>
</head>
<body>
	<div id="game-container"></div>
	<div id="hud-resources" class="hud-panel">Resources: 0</div>
	<div id="hud-wave" class="hud-panel">WAVE 1</div>
	<div id="hud-roster" class="hud-panel"></div>
	<div id="hud-menu" class="hud-panel"></div>
	<div id="hud-thrust" class="hud-panel">
		<div class="thrust-label">THRUST</div>
		<div class="thrust-track">
			<div class="thrust-center"></div>
			<div id="hud-thrust-fill" class="thrust-fill"></div>
		</div>
	</div>
	<div id="hud-help" class="hud-panel">Gamepad: LS heading • RT/LT thrust • A summon • D-pad ◀▶ select
Keyboard: LMB heading • W/S thrust • 1-4 summon • Wheel/Q/E zoom</div>
	<div id="hud-summary">
		<div class="summary-card">
			<div id="hud-summary-title" class="summary-title">WAVE 1 COMPLETE</div>
			<div id="hud-summary-stats" class="summary-stats"></div>
			<div id="hud-summary-menu" class="summary-menu"></div>
		</div>
	</div>
	<div id="hud-title">
		<div class="summary-card">
			<div class="summary-title">HORDE DEFENSE</div>
			<div id="hud-title-menu" class="summary-menu"></div>
		</div>
	</div>
	<div id="hud-loadout">
		<div class="loadout-panel">
			<div class="summary-title">WEAPON LOADOUT</div>
			<div id="hud-loadout-menu"></div>
		</div>
	</div>
	<script type="module" src="/src/main.ts"></script>
</body>
</html>
