<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Horde Defense</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #05080f; }
		body { font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace; color: #d8e2f0; }
		#game-container { position: fixed; inset: 0; }
		#game-container canvas { display: block; }
		.hud-panel {
			position: fixed;
			background: rgba(8, 12, 22, 0.72);
			border: 1px solid rgba(150, 180, 220, 0.15);
			border-radius: 6px;
			padding: 10px 14px;
			font-size: 13px;
			line-height: 1.5;
			white-space: pre;
			pointer-events: none;
			backdrop-filter: blur(4px);
		}
		#hud-resources { top: 12px; left: 12px; font-size: 18px; font-weight: 600; color: #ffd55a; }
		#hud-roster { top: 60px; left: 12px; min-width: 140px; }
		#hud-menu { bottom: 12px; left: 12px; }
		#hud-help { bottom: 12px; right: 12px; color: #98a7be; }
		#hud-thrust { top: 48px; right: 12px; min-width: 160px; }
		.thrust-label { font-size: 10px; letter-spacing: 0.1em; color: #98a7be; margin-bottom: 5px; text-align: center; }
		.thrust-track {
			position: relative;
			width: 160px;
			height: 8px;
			background: rgba(150, 180, 220, 0.12);
			border-radius: 4px;
			overflow: hidden;
		}
		.thrust-center {
			position: absolute;
			left: 50%;
			top: 0;
			width: 1px;
			height: 100%;
			background: rgba(150, 180, 220, 0.4);
		}
		.thrust-fill {
			position: absolute;
			top: 0;
			height: 100%;
			border-radius: 2px;
			transition: left 0.05s, width 0.05s;
		}
	</style>
</head>
<body>
	<div id="game-container"></div>
	<div id="hud-resources" class="hud-panel">Resources: 0</div>
	<div id="hud-roster" class="hud-panel"></div>
	<div id="hud-menu" class="hud-panel"></div>
	<div id="hud-thrust" class="hud-panel">
		<div class="thrust-label">THRUST</div>
		<div class="thrust-track">
			<div class="thrust-center"></div>
			<div id="hud-thrust-fill" class="thrust-fill"></div>
		</div>
	</div>
	<div id="hud-help" class="hud-panel">Gamepad: LS heading • RT/LT thrust • A summon • D-pad ◀▶ select
Keyboard: LMB heading • W/S thrust • 1-4 summon • Wheel/Q/E zoom</div>
	<script type="module" src="/src/main.ts"></script>
</body>
</html>
